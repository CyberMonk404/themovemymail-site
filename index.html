<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PayPal Guest Checkout Demo</title>

  <!-- PayPal JS SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=AQJEjiVF8sdJjTgnkDzIaUtIncISFX8jvz6WdPON2jW3EhdFtHBVGiTZqK2MdDS2g-akbP-XjMVcTocK&currency=USD"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    #paypal-button-container {
      width: 300px;
      margin: auto;
    }
  </style>
</head>
<body>

  <h2>Pay with PayPal or Debit/Credit Card</h2>

  <div id="paypal-button-container"></div>

  <script>
    paypal.Buttons({

      // Create order
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: '10.00' // Change amount here
            }
          }]
        });
      },

      // On approval
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert('Payment completed by ' + details.payer.name.given_name);
          console.log(details);
        });
      },

      // Optional: handle errors
      onError: function(err) {
        console.error(err);
        alert("Something went wrong!");
      }

    }).render('#paypal-button-container');
  </script>

</body>
</html>
